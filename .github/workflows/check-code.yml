name: Check Code

on:
  push:

jobs:
  check-code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun ci

      - name: Make sure, translations are up to date
        run: |
          bun run i18n:extract
          git add .
          git diff --cached --quiet || (echo "Translations are not up to date" && exit 1)

      - name: Compile lingui translations
        run: bun run i18n:compile

      - name: Check code
        run: bun run lint

      - name: Check types
        run: bun run typecheck
